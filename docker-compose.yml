services:
  api:
    image: python:3.12-slim
    working_dir: /app
    command: >
      bash -lc "pip install --no-cache-dir . &&
      python -m proxypulse.api"
    env_file:
      - .env
    volumes:
      - ./:/app
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health/ready', timeout=5)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  bot:
    image: python:3.12-slim
    working_dir: /app
    command: >
      bash -lc "pip install --no-cache-dir . &&
      python -m proxypulse.bot"
    env_file:
      - .env
    volumes:
      - ./:/app
    depends_on:
      - api
    restart: unless-stopped
